{% extends "base.html" %}

{% block content %}
<h2>Local Events List</h2>
<a href="{% url 'localevents:localevent_add' %}">Create Event</a>
<ul>
    {% for localevent in events %}
    <li>
        <h3><a href="{{ localevent.get_absolute_url }}">{{ localevent.title }}</a></h3>
    </li>
    {% endfor %}
</ul>


{% endblock %}
