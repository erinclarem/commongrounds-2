<html lang="en">

<head>
    <title>Common Grounds</title>
</head>

<body>
    {% if user.is_authenticated %}
    <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
    {% else %}
    <a href="{% url 'login' %}">Login</a>
    {% endif %}
    
    <h1 style="text-align: center;">Common Grounds</h1>
    {% block content %}
    {% endblock %}
</body>

</html>
