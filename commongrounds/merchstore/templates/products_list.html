{% extends "base.html" %}
{% block content %}
    <h2>Merchstore Product List</h2>
    <ul>
        {% for product in product_list %}
        <li><p style="font-size: 20px;">
            <a href="{{ product.get_absolute_url }}">{{ product }}</a>
        </p></li>
        {% endfor %}
    </ul>
    <a href="{% url 'merchstore:product_create' %}">Add New Product</a>
{% endblock %}
