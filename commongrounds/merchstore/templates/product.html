{% extends "base.html" %}
{% block content %}
    <h2>{{ product.name }}</h2>
    <h3>Product Details:</h3>
    <ul>
        <li>Price: {{ product.price }} Php</li>
        <li>Description: {{ product.description }}</li>
    </ul>
    <h3>Purchase:</h3>
    <form method="post">
        {% csrf_token %}
        {{ transaction_form }}
        <button type="submit" name="submit" value="Save Form">Buy Now</button>
    </form>
{% endblock %}
